<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>병원 입사 서류 시스템 (3종 통합)</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; }
        .tab-menu { display: flex; background: #e9ecef; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-size: 0.9rem; background: none; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; font-weight: bold; background: #fff; }
        .content-section { padding: 20px; display: none; min-height: 300px; }
        .content-section.active { display: block; }
        .doc-viewer { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; font-size: 0.85rem; height: 250px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .canvas-container { border: 2px dashed #007bff; border-radius: 8px; background: #fff; margin-top: 10px; }
        canvas { width: 100%; height: 150px; touch-action: none; }
        .btn-save { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body style="display:none;" id="mainBody">

<div class="container">
    <div class="header">
        <h3>📄 입사 서류 통합 동의</h3>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab(0)">동의서 1</button>
        <button class="tab-btn" onclick="showTab(1)">동의서 2</button>
        <button class="tab-btn" onclick="showTab(2)">동의서 3</button>
    </div>

    <div id="section0" class="content-section active">
        <label>1페이지 내용 (ONEFFICE 양식)</label>
        <div class="doc-viewer">여기에 첫 번째 동의서(예: 개인정보 수집 동의)의 상세 텍스트를 입력하세요.</div>
    </div>

    <div id="section1" class="content-section">
        <label>2페이지 내용 (ONEFFICE 양식)</label>
        <div class="doc-viewer">여기에 두 번째 동의서(예: 보안 서약서)의 상세 텍스트를 입력하세요.</div>
    </div>

    <div id="section2" class="content-section">
        <label>3페이지 및 서명</label>
        <div class="doc-viewer">여기에 세 번째 동의서 내용을 입력하세요.</div>
        
        <div class="input-group">
            <label>성명</label>
            <input type="text" id="userName" placeholder="성함을 입력하세요">
        </div>
        <div class="input-group">
            <label>생년월일</label>
            <input type="date" id="userBirth">
        </div>
        <label>서명 (아래 사각형 안)</label>
        <div class="canvas-container"><canvas id="signature-pad"></canvas></div>
        <button class="btn-save" onclick="generateMultiPagePDF()">모든 동의서 PDF 저장</button>
    </div>
</div>

<script>
    // 비밀번호 보안
    if (prompt("비밀번호를 입력하세요.") === "1234") {
        document.getElementById('mainBody').style.display = 'block';
    } else {
        alert("비밀번호 오류");
        window.location.reload();
    }

    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });

    function showTab(idx) {
        document.querySelectorAll('.content-section, .tab-btn').forEach((el, i) => {
            el.classList.toggle('active', (i % 3) === idx);
        });
        if(idx === 2) resizeCanvas();
    }

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    async function generateMultiPagePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value;
        const sig = signaturePad.toDataURL();

        if (!name || signaturePad.isEmpty()) return alert("정보를 모두 입력해 주세요.");

        // 1페이지 생성 [cite: 1]
        doc.text("제 1 장: 개인정보 수집 동의서", 10, 20);
        doc.setFontSize(10);
        doc.text("동의서 1페이지의 상세 내용을 여기에 배치합니다...", 10, 40);
        
        // 2페이지 추가 [cite: 2]
        doc.addPage();
        doc.text("제 2 장: 보안 유지 서약서", 10, 20);
        doc.text("동의서 2페이지의 상세 내용을 여기에 배치합니다...", 10, 40);

        // 3페이지 추가 [cite: 3]
        doc.addPage();
        doc.text("제 3 장: 기타 확인 사항 및 서명", 10, 20);
        doc.text(`성명: ${name}`, 10, 50);
        doc.addImage(sig, 'PNG', 10, 60, 50, 20);
        doc.text(`작성일자: ${new Date().toLocaleDateString()}`, 10, 90);

        doc.save(`입사서류_통합_${name}.pdf`);
        alert("3페이지 분량의 PDF가 생성되었습니다.");
    }
</script>
</body>
</html>
