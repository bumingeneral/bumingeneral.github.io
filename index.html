<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>부민병원 부산 입사 서류 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #fff; color: #333; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        /* 1. HTML에 로고 스타일 추가 */
        .logo-img { max-width: 80%; height: auto; margin-bottom: 10px; }
        .tab-menu { display: flex; background: #e9ecef; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-size: 0.85rem; background: none; color: #666; transition: 0.3s; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; font-weight: bold; background: #fff; }
        .content-section { padding: 20px; display: none; }
        .content-section.active { display: block; }
        .doc-box { background: #f8f9fa; border: 1px solid #eee; padding: 15px; border-radius: 8px; font-size: 0.9rem; line-height: 1.6; height: 300px; overflow-y: auto; margin-bottom: 15px; color: #444; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .signature-label { margin-top: 15px; display: block; font-weight: bold; color: #007bff; }
        .canvas-container { border: 2px dashed #007bff; border-radius: 8px; background: #fff; margin-top: 5px; }
        canvas { width: 100%; height: 150px; touch-action: none; }
        .btn-save { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body style="display:none;" id="mainBody">

<div class="container">
    <div class="header">
        <img src="image_0.png" alt="부민병원 부산 로고" class="logo-img">
        <h3>입사 서류 통합 동의서</h3>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab(0)">1페이지</button>
        <button class="tab-btn" onclick="showTab(1)">2페이지</button>
        <button class="tab-btn" onclick="showTab(2)">3페이지/서명</button>
    </div>

    <div id="section0" class="content-section active">
        <div class="doc-box">
            <strong>[제 1 장: 개인정보 수집 및 이용 동의]</strong><br><br>
            여기에 PDF 1페이지의 내용을 복사해서 넣어주세요.
        </div>
        <p style="text-align:right; font-size:0.8rem; color:blue;">다음 탭을 눌러주세요 ➔</p>
    </div>

    <div id="section1" class="content-section">
        <div class="doc-box">
            <strong>[제 2 장: 보안 서약서 및 준수사항]</strong><br><br>
            여기에 PDF 2페이지의 내용을 복사해서 넣어주세요.
        </div>
        <p style="text-align:right; font-size:0.8rem; color:blue;">다음 탭을 눌러주세요 ➔</p>
    </div>

    <div id="section2" class="content-section">
        <div class="doc-box">
            <strong>[제 3 장: 기타 동의 사항]</strong><br><br>
            여기에 PDF 3페이지의 내용을 복사해서 넣어주세요.
        </div>
        
        <div class="input-group">
            <label>작성자 성명</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요">
        </div>
        <div class="input-group">
            <label>생년월일</label>
            <input type="date" id="userBirth">
        </div>
        
        <span class="signature-label">위 내용에 모두 동의하며 서명합니다.</span>
        <div class="canvas-container"><canvas id="signature-pad"></canvas></div>
        
        <button class="btn-save" onclick="generateFinalPDF()">동의서(3장) PDF 생성</button>
    </div>
</div>

<script>
    // 비밀번호 설정 (초기값 1234)
    if (prompt("병원 보안 비밀번호를 입력하세요.") === "1234") {
        document.getElementById('mainBody').style.display = 'block';
    } else {
        alert("비밀번호가 틀렸습니다.");
        window.location.reload();
    }

    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });

    function showTab(idx) {
        document.querySelectorAll('.content-section').forEach((el, i) => el.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-btn').forEach((el, i) => el.classList.toggle('active', i === idx));
        if(idx === 2) resizeCanvas();
    }

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    async function generateFinalPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value;
        const birth = document.getElementById('userBirth').value;
        const sig = signaturePad.toDataURL();

        if (!name || !birth || signaturePad.isEmpty()) {
            return alert("모든 정보 입력과 서명을 완료해 주세요.");
        }

        // 2. PDF에 로고 추가 및 좌표 조정
        // 로고 이미지 URL (HTML과 같은 폴더에 업로드된 경우)
        const logoUrl = 'image_0.png'; 
        
        try {
            // 이미지를 로드하여 PDF에 추가 (비동기 처리)
            await doc.addImage(logoUrl, 'PNG', 20, 10, 50, 20); // x=20, y=10, width=50, height=20 (단위: mm)
            
            // 1페이지 생성 (좌표 조정)
            doc.setFontSize(18);
            doc.text("개인정보 수집 및 이용 동의서", 105, 40, { align: 'center' }); // y=40으로 수정
            doc.setFontSize(10);
            doc.text("1페이지 상세 내용 (여기에 1페이지 텍스트 반영)", 20, 60); // y=60으로 수정

            // 2페이지 생성
            doc.addPage();
            await doc.addImage(logoUrl, 'PNG', 20, 10, 50, 20); // 2페이지 상단에도 로고 추가
            doc.setFontSize(18);
            doc.text("보안 서약서", 105, 40, { align: 'center' }); // y=40으로 수정
            doc.setFontSize(10);
            doc.text("2페이지 상세 내용 (여기에 2페이지 텍스트 반영)", 20, 60); // y=60으로 수정

            // 3페이지 생성
            doc.addPage();
            await doc.addImage(logoUrl, 'PNG', 20, 10, 50, 20); // 3페이지 상단에도 로고 추가
            doc.setFontSize(18);
            doc.text("기타 확인 및 최종 서명", 105, 40, { align: 'center' }); // y=40으로 수정
            doc.setFontSize(12);
            doc.text(`성 명: ${name}`, 20, 80); // y=80으로 수정
            doc.text(`생년월일: ${birth}`, 20, 90); // y=90으로 수정
            doc.text("본인은 상기 모든 동의 사항(1~3페이지)을 숙지하였으며,", 20, 110); // y=110으로 수정
            doc.text("이에 기꺼이 동의합니다.", 20, 120); // y=120으로 수정
            doc.addImage(sig, 'PNG', 20, 130, 50, 20); // 서명 이미지 y=130으로 수정
            doc.text(`작성일자: ${new Date().toLocaleString()}`, 20, 160); // y=160으로 수정

            doc.save(`입사동의서_통합_${name}.pdf`);
            alert("부민병원 부산 3페이지 통합 동의서가 생성되었습니다.");
        } catch (error) {
            console.error('로고 이미지를 로드하지 못했습니다:', error);
            alert('PDF 생성 중 로고 이미지를 불러오는 데 실패했습니다. 파일 업로드 상태를 확인해 주세요.');
        }
    }
</script>
</body>
</html>
